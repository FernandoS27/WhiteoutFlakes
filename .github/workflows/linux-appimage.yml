name: Linux AppImage

# Manual-only: CI minutes cost real money and the Linux AppImage doesn't
# need to rebuild on every commit. Trigger from the Actions tab → "Run
# workflow", or `gh workflow run linux-appimage.yml` from the CLI.
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  appimage:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ---- System deps -------------------------------------------------
      # GLFW under Wayland/X11 pulls in the X dev headers (libxkbcommon,
      # libwayland-dev, libxrandr-dev, libxinerama-dev, libxcursor-dev,
      # libxi-dev); cubeb wants ALSA + PulseAudio headers; gtk3 is for
      # nativefiledialog-extended's GTK backend.
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            libxkbcommon-dev libwayland-dev wayland-protocols \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev \
            libgl1-mesa-dev mesa-vulkan-drivers \
            libasound2-dev libpulse-dev \
            libgtk-3-dev \
            software-properties-common \
            wget file
          # FUSE for running linuxdeploy AppImage. Ubuntu 24.04 renamed
          # libfuse2 → libfuse2t64 (time_t64 ABI transition). Try both.
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2

      # Configure step pins CC=gcc-15 / CXX=g++-15 directly so we don't
      # depend on update-alternatives actually displacing the runner's
      # default `gcc` symlink (which may be a plain link rather than an
      # alternative on stock images).
      - name: Install GCC 15
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-15 g++-15
          gcc-15 --version
          g++-15 --version

      # ---- Vulkan SDK (full tarball from sdk.lunarg.com) ---------------
      # The LunarG noble apt repo only ships individual packages (loader,
      # glslang, dxc, gfxreconstruct), no `vulkan-sdk` meta-package and no
      # vk_mem_alloc.h or vulkan-hpp. We need the full SDK for VMA + a
      # specific Vulkan-Hpp version that matches the Windows-side install
      # (newer vulkan-hpp flattened the RAII allocateCommandBuffers return
      # type, breaking call sites). Download the tarball directly so we
      # control the exact version.
      #
      # Bump VULKAN_SDK_VERSION in lockstep with your local Windows SDK.
      # slangc is bundled but unused on CI — shaders ship prebuilt under
      # prebuilt/shaders (see WDX_USE_PREBUILT_SHADERS).
      - name: Install Vulkan SDK
        env:
          VULKAN_SDK_VERSION: "1.4.341.0"
        run: |
          mkdir -p $HOME/vulkan-sdk
          cd $HOME/vulkan-sdk
          wget -q "https://sdk.lunarg.com/sdk/download/${VULKAN_SDK_VERSION}/linux/vulkansdk-linux-x86_64-${VULKAN_SDK_VERSION}.tar.xz"
          tar xJf "vulkansdk-linux-x86_64-${VULKAN_SDK_VERSION}.tar.xz"
          rm "vulkansdk-linux-x86_64-${VULKAN_SDK_VERSION}.tar.xz"
          # Persist the SDK env vars for subsequent steps (configure +
          # build need VULKAN_SDK on PATH so cmake's find_package(Vulkan)
          # resolves to this install rather than any system one).
          SDK_ROOT="$HOME/vulkan-sdk/${VULKAN_SDK_VERSION}/x86_64"
          echo "VULKAN_SDK=${SDK_ROOT}"                                 >> $GITHUB_ENV
          echo "PATH=${SDK_ROOT}/bin:${PATH}"                           >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=${SDK_ROOT}/lib:${LD_LIBRARY_PATH:-}"   >> $GITHUB_ENV
          echo "VK_LAYER_PATH=${SDK_ROOT}/etc/vulkan/explicit_layer.d"  >> $GITHUB_ENV
          # Sanity-check the bits we actually rely on. Failing here gives
          # a clearer error than a confusing compile/configure failure
          # 100 steps later.
          test -f "${SDK_ROOT}/include/vulkan/vulkan.hpp"        || { echo "::error::missing vulkan.hpp in SDK"; exit 1; }
          test -f "${SDK_ROOT}/include/vma/vk_mem_alloc.h"       || { echo "::error::missing vk_mem_alloc.h in SDK"; exit 1; }
          # slangc isn't invoked on CI (we ship prebuilt shaders) but
          # confirm it's present so a future shader-build job picks the
          # same SDK. The full SDK has bundled it since 1.3.290.
          test -x "${SDK_ROOT}/bin/slangc"                       || { echo "::error::missing slangc in SDK"; exit 1; }
          "${SDK_ROOT}/bin/slangc" -v 2>&1 | head -3 || true
          echo "Vulkan SDK ${VULKAN_SDK_VERSION} OK (vulkan.hpp + VMA + slangc present)"

      # ---- Configure + build -------------------------------------------
      # WDX_USE_PREBUILT_SHADERS auto-enables when prebuilt/shaders/ exists,
      # but pin it explicitly so a missing/stale prebuilt fails loud instead
      # of silently falling through to slangc (which would explode CI time).
      # Tracy is off in CI builds — the AppImage ships to end users, not
      # profilers. Debug shader variants are off for the same reason.
      - name: Configure
        env:
          CC: gcc-15
          CXX: g++-15
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DWDX_BUILD_WC3_SHADERS=OFF \
            -DWDX_USE_PREBUILT_SHADERS=ON \
            -DWDX_BUILD_WC3_DEBUG_SHADERS=OFF \
            -DWDX_ENABLE_TRACY=OFF \
            -DWDX_BUILD_MAX_PLUGIN=OFF \
            -DCMAKE_INSTALL_PREFIX=AppDir/usr

      - name: Build viewer
        run: cmake --build build --target WhiteoutFlakesStandalone --parallel

      - name: Install into AppDir
        run: |
          cmake --install build
          # Standard AppImage placement: top-level desktop + icon symlinks.
          cp packaging/linux/WhiteoutFlakes.desktop AppDir/
          cp resources/flakes_icon_linux.png AppDir/WhiteoutFlakes.png
          # AppImage requires a .DirIcon symlink too.
          ln -sf WhiteoutFlakes.png AppDir/.DirIcon

      # ---- linuxdeploy: collect deps + produce the .AppImage -----------
      - name: Fetch linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

      - name: Build AppImage
        env:
          VERSION: ${{ github.sha }}
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/WhiteoutFlakes \
            --desktop-file AppDir/usr/share/applications/WhiteoutFlakes.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/WhiteoutFlakes.png \
            --output appimage

      - name: Rename artifact
        run: |
          mv WhiteoutFlakes-*.AppImage WhiteoutFlakes-linux-x86_64.AppImage || true
          ls -la *.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: WhiteoutFlakes-linux-x86_64
          path: WhiteoutFlakes-linux-x86_64.AppImage
          if-no-files-found: error
          retention-days: 14
