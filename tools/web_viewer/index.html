<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WhiteoutFlakes — Viewer</title>
<style>
  /* Mirrors hiveworkshop.com's `ratory_wc3model_preview` shell — XF
     `block / block-container / block-header / block-body` stack on a
     dark background, `color-chip` swatch grids, and Hive's specific
     warm-gold list / cream-header palette. Progress bar is a green
     strip at the top of the viewer container, matching Hive. */
  :root {
    --bg:               #0a0a0a;
    --bg-canvas:        #000;
    --panel:            #161616;
    --panel-header:     #1c1c1c;
    --divider:          #2a2a2a;
    --header-text:      #dddddd;   /* "Models", "Team colors" — neutral cream */
    --text:             #c9a14a;   /* list item dim gold */
    --text-bright:      #ffce40;   /* hover / selected gold */
    --title-text:       #e8e8e8;   /* "View in 3D" */
    --muted:            #888888;
    --hover-bg:         #1d1d1d;
    --selected-bg:      rgba(255, 206, 64, 0.08);
    --btn-border:       #8a6a20;
    --topbar-border:    #2a2a2a;
    --progress:         #20c000;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: var(--bg); color: var(--text);
    font: 13px/1.4 "Trebuchet MS", "Segoe UI", Tahoma, Arial, sans-serif;
  }
  body { display: grid; grid-template-rows: auto 1fr; height: 100vh; user-select: none; }

  /* ---- Top bar: "View in 3D" title + volume + close. Hive embeds the
         viewer inside the regular XF page chrome; this standalone keeps
         the title so the embed shape reads the same. ---- */
  #topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 16px; background: var(--bg);
    border-bottom: 1px solid var(--topbar-border);
    gap: 12px;
  }
  #topbar .title  { font-size: 22px; color: var(--title-text); font-weight: 600; letter-spacing: 0.2px; }
  #topbar .spacer { flex: 1; }
  #topbar .close  { font-size: 22px; line-height: 1; color: var(--muted);
                    cursor: pointer; padding: 0 8px; }
  #topbar .close:hover { color: var(--title-text); }

  /* Volume slider (top-right). Native range with thumb restyled to a
     small neutral disc — keeps the chrome unobtrusive. */
  #vol-wrap {
    display: flex; align-items: center; gap: 8px;
    color: var(--muted); font-size: 12px;
  }
  #vol-wrap label { user-select: none; }
  #vol-slider {
    -webkit-appearance: none; appearance: none;
    width: 140px; height: 3px;
    background: #2a2a2a;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 12px; height: 12px; border-radius: 50%;
    background: #c8c8c8;
    border: 1px solid #000;
    cursor: pointer;
  }
  #vol-slider::-moz-range-thumb {
    width: 12px; height: 12px; border-radius: 50%;
    background: #c8c8c8;
    border: 1px solid #000;
    cursor: pointer;
  }

  /* ---- Hive's `.ratory.model-viewer` root: canvas + sidebar + progress.
         Sidebar fixed-width on the right, canvas grows to fill. ---- */
  .ratory.model-viewer {
    display: grid;
    grid-template-columns: 1fr 260px;
    min-height: 0; min-width: 0;
    position: relative;
  }
  .ratory.model-viewer > canvas {
    background: var(--bg-canvas);
    width: 100%; height: 100%;
    display: block;
    min-width: 0; min-height: 0;
  }
  .ratory.model-viewer .sidebar {
    background: var(--panel);
    overflow-y: auto;
    border-left: 1px solid var(--divider);
    padding: 0 0 14px;
  }

  /* ---- XF-style block stack. Header is a cream/neutral title in a
         slightly lighter strip above the body. ---- */
  .block { margin: 0 0 10px 0; }
  .block:first-child { margin-top: 0; }
  .block-container { background: var(--panel); }
  .block-header {
    padding: 8px 14px;
    font-size: 15px; font-weight: 700;
    color: var(--header-text);
    background: var(--panel-header);
    border-bottom: 1px solid var(--divider);
    letter-spacing: 0.1px;
  }
  .block-body { padding: 6px 12px; }

  /* ---- Models / Animations / Cameras lists (Hive populates these JS-side
         with bare children; we match that shape with <a> rows). ---- */
  .block-body.models,
  .block-body.animations,
  .block-body.cameras {
    padding: 4px 0;
  }
  .block-body.models > a,
  .block-body.animations > a,
  .block-body.cameras > a {
    display: block;
    padding: 3px 14px;
    cursor: pointer;
    color: var(--text);
    text-decoration: none;
    font-size: 13px;
  }
  .block-body.models > a:hover,
  .block-body.animations > a:hover,
  .block-body.cameras > a:hover {
    color: var(--text-bright);
  }
  .block-body.models > a.active,
  .block-body.animations > a.active,
  .block-body.cameras > a.active {
    background: var(--selected-bg);
    color: var(--text-bright);
    font-weight: 700;
  }
  .block-body > .empty {
    display: block;
    padding: 3px 14px;
    color: var(--muted);
    font-style: italic;
  }

  /* ---- Open directory button — our addition (Hive's viewer pre-loads
         models server-side; we let the user pick a local folder). ---- */
  #open-dir {
    display: block;
    margin: 6px 12px;
    background: transparent; color: var(--text);
    border: 1px solid var(--btn-border);
    padding: 5px 10px; cursor: pointer; font: inherit;
    width: calc(100% - 24px);
    border-radius: 2px;
  }
  #open-dir:hover  { background: var(--hover-bg); color: var(--text-bright); }
  #open-dir:active { background: rgba(255, 206, 64, 0.12); }

  /* ---- color-chips. Square swatches in a tight grid — Hive uses 6×4 for
         team colors, 6 + 1 picker for backgrounds. ---- */
  .block-body.color-chips {
    display: grid; gap: 3px;
    padding: 8px 12px;
  }
  .block-body.team-colors      { grid-template-columns: repeat(8, 1fr); }
  .block-body.background-colors{ grid-template-columns: repeat(7, 1fr); }
  .color-chip {
    display: block;
    width: 100%;
    aspect-ratio: 1;
    cursor: pointer;
    border: 1px solid #000;
    box-sizing: border-box;
    -webkit-appearance: none; appearance: none;
    padding: 0;
  }
  .color-chip:hover  { outline: 1px solid var(--text-bright); outline-offset: -1px; }
  .color-chip.active { outline: 2px solid var(--text-bright); outline-offset: -2px; }
  input.color-chip { background: transparent; }
  input.color-chip::-webkit-color-swatch-wrapper { padding: 0; }
  input.color-chip::-webkit-color-swatch        { border: none; }
  input.color-chip::-moz-color-swatch           { border: none; }

  /* ---- Loading / progress bar. Hive shows the load progress as a thin
         green bar at the top of the viewer container; we mirror that
         placement. The wrapper is normally hidden (opacity 0); host JS
         toggles `.active` to show it and writes `--pct` in determinate
         mode (set together with `.determinate`). ---- */
  .progress {
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 3px;
    background: rgba(255, 255, 255, 0.06);
    overflow: hidden;
    pointer-events: none;
    opacity: 0;
    transition: opacity 200ms ease-out;
    z-index: 10;
  }
  .progress.active { opacity: 1; }
  .progress > div {
    height: 100%;
    background: var(--progress);
    transform: translateX(-100%);
    animation: progress-slide 1.6s ease-in-out infinite;
  }
  .progress.determinate > div {
    animation: none;
    transform: translateX(calc(-100% + var(--pct, 0%)));
    transition: transform 120ms linear;
  }
  @keyframes progress-slide {
    0%   { transform: translateX(-100%); }
    50%  { transform: translateX(30%); }
    100% { transform: translateX(140%); }
  }

</style>
</head>
<body>
  <div id="topbar">
    <span class="title">View in 3D</span>
    <span class="spacer"></span>
    <div id="vol-wrap" title="Sound volume">
      <label for="vol-slider">Volume</label>
      <input id="vol-slider" type="range" min="0" max="100" step="1" value="50">
    </div>
    <span id="close-btn" class="close" title="Close">×</span>
  </div>

  <!--
    `.ratory.model-viewer` root mirrors Hive's `ratory_wc3model_preview`
    template (see hive.html line ~1870). Same DOM shape & class names
    so the sidebar block stack reads identical to a Hive embed; only
    addition is the "Open directory…" button inside the Models block.
  -->
  <div class="ratory model-viewer" id="viewer-root">
    <canvas id="wf-canvas"></canvas>
    <div class="progress" id="progress"><div></div></div>
    <div class="sidebar">

      <div class="block models-container">
        <div class="block-container">
          <div class="block-header">Models</div>
          <div class="block-body models" id="model-list">
            <button id="open-dir" type="button">Open directory…</button>
            <input id="dir-input" type="file" webkitdirectory multiple style="display:none">
            <span class="empty">(pick a directory to populate)</span>
          </div>
        </div>
      </div>

      <div class="block">
        <div class="block-container">
          <div class="block-header">Team colors</div>
          <div class="block-body color-chips team-colors" id="team-swatches">
            <a class="color-chip" data-player-number="0"  title="Red"        style="background-color:#ff0402"></a>
            <a class="color-chip" data-player-number="1"  title="Blue"       style="background-color:#0042ff"></a>
            <a class="color-chip" data-player-number="2"  title="Teal"       style="background-color:#1be6ba"></a>
            <a class="color-chip" data-player-number="3"  title="Purple"     style="background-color:#540081"></a>
            <a class="color-chip" data-player-number="4"  title="Yellow"     style="background-color:#fffc00"></a>
            <a class="color-chip" data-player-number="5"  title="Orange"     style="background-color:#ff8a0d"></a>
            <a class="color-chip" data-player-number="6"  title="Green"      style="background-color:#20c000"></a>
            <a class="color-chip" data-player-number="7"  title="Pink"       style="background-color:#e45bb0"></a>
            <a class="color-chip" data-player-number="8"  title="Gray"       style="background-color:#949697"></a>
            <a class="color-chip" data-player-number="9"  title="Light blue" style="background-color:#7ebff1"></a>
            <a class="color-chip" data-player-number="10" title="Dark green" style="background-color:#106247"></a>
            <a class="color-chip" data-player-number="11" title="Brown"      style="background-color:#4f2a05"></a>
            <a class="color-chip" data-player-number="12" title="Maroon"     style="background-color:#9c0000"></a>
            <a class="color-chip" data-player-number="13" title="Navy"       style="background-color:#0000c3"></a>
            <a class="color-chip" data-player-number="14" title="Turquoise"  style="background-color:#00ebff"></a>
            <a class="color-chip" data-player-number="15" title="Violet"     style="background-color:#bd00ff"></a>
            <a class="color-chip" data-player-number="16" title="Wheat"      style="background-color:#eccd86"></a>
            <a class="color-chip" data-player-number="17" title="Peach"      style="background-color:#f7a48b"></a>
            <a class="color-chip" data-player-number="18" title="Mint"       style="background-color:#c0ff80"></a>
            <a class="color-chip" data-player-number="19" title="Lavender"   style="background-color:#dcb9ec"></a>
            <a class="color-chip" data-player-number="20" title="Coal"       style="background-color:#4f4f55"></a>
            <a class="color-chip" data-player-number="21" title="Snow"       style="background-color:#ecf0ff"></a>
            <a class="color-chip" data-player-number="22" title="Emerald"    style="background-color:#00781e"></a>
            <a class="color-chip" data-player-number="23" title="Peanut"     style="background-color:#a46f33"></a>
          </div>
        </div>
      </div>

      <div class="block">
        <div class="block-container">
          <div class="block-header">Background</div>
          <div class="block-body color-chips background-colors" id="bg-swatches">
            <a class="color-chip" data-bg="#3e3e3e" title="Dark gray"      style="background-color:#3e3e3e"></a>
            <a class="color-chip" data-bg="#000000" title="Black"          style="background-color:#000000"></a>
            <a class="color-chip" data-bg="#ffffff" title="White"          style="background-color:#ffffff"></a>
            <a class="color-chip" data-bg="#87CEEB" title="Sky"            style="background-color:#87CEEB"></a>
            <a class="color-chip" data-bg="#00b140" title="Chroma green"   style="background-color:#00b140"></a>
            <a class="color-chip" data-bg="#b500b5" title="Chroma magenta" style="background-color:#b500b5"></a>
            <input id="bg-picker" type="color" class="color-chip color-chip--picker"
                   value="#3e3e3e" title="Custom color">
          </div>
        </div>
      </div>

      <div class="block">
        <div class="block-container">
          <div class="block-header">Animations</div>
          <div class="block-body animations" id="anim-list">
            <span class="empty">(no model loaded)</span>
          </div>
        </div>
      </div>

      <div class="block">
        <div class="block-container">
          <div class="block-header">Cameras</div>
          <div class="block-body cameras" id="camera-list">
            <a id="cam-reset" data-camera="reset">Reset</a>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Web Crypto enforces a 65,536-byte cap on getRandomValues per call,
    // but Emscripten's libc init asks for ~294 KB in one shot. Wrap before
    // any module loads.
    (function () {
      const MAX = 65536;
      const native = crypto.getRandomValues.bind(crypto);
      crypto.getRandomValues = function (buf) {
        if (!buf || buf.byteLength <= MAX) return native(buf);
        const u8 = new Uint8Array(buf.buffer, buf.byteOffset, buf.byteLength);
        for (let off = 0; off < u8.length; off += MAX) {
          native(u8.subarray(off, Math.min(off + MAX, u8.length)));
        }
        return buf;
      };
    })();
  </script>
  <script type="module">
    try {
      const { HiveApp } = await import('./hive_app.js?t=' + Date.now());
      const app = new HiveApp();
      await app.start();
      window.__hive = app;
    } catch (e) {
      console.error('[wf] FATAL', e);
    }
  </script>
</body>
</html>
