<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>wf-min — V8 isolation harness</title>
<style>
  body { background:#0a0a0a; color:#eee; font:14px/1.4 monospace; padding:16px; }
  #log { white-space:pre-wrap; }
  .err { color:#f88; }
</style>
</head>
<body>
<h2 style="color:#888;font-family:system-ui">wf-min — minimal wasm, V8 isolation harness</h2>
<div id="log"></div>
<script type="module">
  const logEl = document.getElementById('log');
  const t0 = performance.now();
  const ms = () => (performance.now() - t0).toFixed(0) + ' ms';
  const log = (s, cls) => {
    const ln = document.createElement('div');
    if (cls) ln.className = cls;
    ln.textContent = s;
    logEl.appendChild(ln);
  };
  try {
    log('Importing wf-core-min.js @' + ms());
    const mod = (await import('./wf-core-min.js')).default;
    log('Module factory loaded @' + ms());
    const Module = await mod({
      print:    (s) => log('[wasm] ' + s),
      printErr: (s) => log('[wasm] ' + s, 'err'),
    });
    log('Module instantiated @' + ms());
    const h = Module._wf_create();
    log('wf_create handle=' + h + ' @' + ms());
    const ok = Module._wf_init(h, 0, 800, 600);
    log('wf_init returned ' + ok + ' @' + ms());
    Module._wf_destroy(h);
    log('Disposed. Minimal wasm path OK.');
  } catch (e) {
    log('FATAL: ' + (e && e.message || e), 'err');
    console.error(e);
  }
</script>
</body>
</html>
